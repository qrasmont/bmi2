name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  keep-in-sync:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Check that and async versions are in sync
        run: make check-async-sync
