name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build sync
      run: cargo build --features blocking --verbose
    - name: Run tests sync
      run: cargo test --features blocking --verbose
    - name: Build async
      run: cargo build --features async --verbose 
